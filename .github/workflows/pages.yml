# Stub flotte : déploiement GitHub Pages (logique dans fleet-kit/pages.yml).
# Si le site a un build : renseigner build_command et output_dir.
name: Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  pages:
    # Repo privé = Pages non activé : on saute le job ; se réactive tout seul au passage en public.
    if: ${{ !github.event.repository.private }}
    uses: Thibaud888/fleet-kit/.github/workflows/pages.yml@main
    permissions:
      pages: write
      id-token: write
